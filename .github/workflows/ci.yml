name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-macos:
    name: Test (macOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build --product pdf-ingest
      - name: Test
        run: swift test

  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    container:
      image: swift:6.0
    steps:
      - uses: actions/checkout@v4
      - name: Install SQLite3 dev headers
        run: apt-get update && apt-get install -y libsqlite3-dev
      - name: Build libraries
        run: swift build --target Ingest --target Store
      - name: Test libraries
        run: swift test
